---
layout: default
---

<article>
  <header class="post-hero">
    <div class="post-date">{{ page.date | date: "%B %-d, %Y" }}</div>
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}<p class="post-subtitle">{{ page.subtitle }}</p>{% endif %}
    {% if page.tags.size > 0 %}
    <div class="post-tags">
      {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% unless forloop.last %}, {% endunless %}{% endfor %}
    </div>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <div class="post-footer">
    <a href="/blog/" class="back-link"><span class="arrow">&larr;</span> All posts</a>
  </div>
</article>
