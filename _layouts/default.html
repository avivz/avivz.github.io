<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
<meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
<link rel="icon" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/blog.css">
<script>
MathJax = {
  tex: {
    inlineMath: [['$', '$'], ['\\(', '\\)']],
    displayMath: [['$$', '$$'], ['\\[', '\\]']],
    processEscapes: true
  },
  svg: { fontCache: 'global' }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
</head>
<body>

<nav class="blog-nav">
  <div class="blog-nav-inner">
    <a href="/blog/" class="site-name">Aviv Zohar</a>
    <div class="nav-links">
      <a href="/blog/"{% if page.url == '/blog/' or page.url == '/blog/index.html' %} class="active"{% endif %}>Blog</a>
      <a href="/projects/"{% if page.url contains '/projects/' %} class="active"{% endif %}>Projects</a>
      <a href="/">Main Site</a>
    </div>
  </div>
</nav>

<main class="blog-container">
  {{ content }}
</main>

<footer class="blog-footer">
</footer>

</body>
</html>
