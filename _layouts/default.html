<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
<meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
<link rel="icon" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/aaaakshat/cm-web-fonts@latest/font/Serif/cmun-serif.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/aaaakshat/cm-web-fonts@latest/font/Typewriter/cmun-typewriter.css" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/notes.css">
<script>
MathJax = {
  tex: {
    inlineMath: [['$', '$'], ['\\(', '\\)']],
    displayMath: [['$$', '$$'], ['\\[', '\\]']],
    processEscapes: true
  },
  svg: { fontCache: 'global' }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

<!-- Google Tag Manager -->
<script>
  (function (w, d, s, l, i) {
    w[l] = w[l] || [];
    w[l].push({
      "gtm.start": new Date().getTime(),
      event: "gtm.js",
    });
    var f = d.getElementsByTagName(s)[0],
      j = d.createElement(s),
      dl = l != "dataLayer" ? "&l=" + l : "";
    j.async = true;
    j.src = "https://www.googletagmanager.com/gtm.js?id=" + i + dl;
    f.parentNode.insertBefore(j, f);
  })(window, document, "script", "dataLayer", "GTM-KX6CHWX");
</script>
<!-- End Google Tag Manager -->
</head>
<body>

<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KX6CHWX" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->

<!-- ===== Running Header ===== -->
<header class="running-header">
  <div class="header-inner">
    <span><a href="/">A. Zohar</a></span>
    <nav class="nav-links">
      <a href="/notes/"{% if page.url == '/notes/' or page.url == '/notes/index.html' %} class="active"{% endif %}>Notes</a>
      <span class="sep">&middot;</span>
      <a href="/projects/"{% if page.url contains '/projects/' %} class="active"{% endif %}>Research Projects</a>
      <span class="sep">&middot;</span>
      <a href="/">Main</a>
    </nav>
  </div>
</header>

<main class="content-column">
  {{ content }}
</main>

<footer class="page-footer">
  <div class="footer-inner">
    <nav class="footer-nav">
      <a href="/notes/">Notes</a>
      <span class="sep">&middot;</span>
      <a href="/projects/">Research Projects</a>
      <span class="sep">&middot;</span>
      <a href="/">Main</a>
    </nav>
  </div>
</footer>

<script>
(function () {
  var btn = document.createElement('button');
  btn.className = 'scroll-to-top';
  btn.setAttribute('aria-label', 'Scroll to top');
  btn.innerHTML =
    '<svg viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">' +
    '<path d="M14,24 C14,22 14.5,16 14,10 C13.5,7 14,5 14,4" ' +
    'stroke="#c0392b" stroke-width="2" stroke-linecap="round" fill="none"/>' +
    '<path d="M7,12 C9,9 11,6 14,4 C17,6 19,9 21,12" ' +
    'stroke="#c0392b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>' +
    '</svg>';

  btn.addEventListener('click', function () {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  var showThreshold = 300;
  function updateScrollBtn() {
    var y = window.scrollY;
    btn.classList.toggle('visible', y > showThreshold);
    var bob = Math.sin(y * 0.008) * 4;
    var tilt = Math.sin(y * 0.006 + 1) * 5;
    btn.style.transform = 'translateY(' + bob + 'px) rotate(' + tilt + 'deg)';
  }
  window.addEventListener('scroll', updateScrollBtn, { passive: true });
  updateScrollBtn();

  document.body.appendChild(btn);
})();
</script>

</body>
</html>
