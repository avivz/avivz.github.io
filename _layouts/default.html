<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
<meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
<link rel="icon" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/aaaakshat/cm-web-fonts@latest/font/Serif/cmun-serif.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/aaaakshat/cm-web-fonts@latest/font/Typewriter/cmun-typewriter.css" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/blog.css">
<script>
MathJax = {
  tex: {
    inlineMath: [['$', '$'], ['\\(', '\\)']],
    displayMath: [['$$', '$$'], ['\\[', '\\]']],
    processEscapes: true
  },
  svg: { fontCache: 'global' }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
</head>
<body>

<!-- ===== Running Header ===== -->
<header class="running-header">
  <div class="header-inner">
    <span><a href="/">A. Zohar</a> &mdash; {% if page.title %}{{ page.title }}{% else %}Notes{% endif %}</span>
    <nav class="nav-links">
      <a href="/blog/"{% if page.url == '/blog/' or page.url == '/blog/index.html' %} class="active"{% endif %}>Notes</a>
      <span class="sep">&middot;</span>
      <a href="/projects/"{% if page.url contains '/projects/' %} class="active"{% endif %}>Research Projects</a>
      <span class="sep">&middot;</span>
      <a href="/">Main</a>
    </nav>
  </div>
</header>

<main class="content-column">
  {{ content }}
</main>

<footer class="page-footer">
  <div class="footer-inner">
    <nav class="footer-nav">
      <a href="/blog/">Notes</a>
      <span class="sep">&middot;</span>
      <a href="/projects/">Research Projects</a>
      <span class="sep">&middot;</span>
      <a href="/">Main</a>
    </nav>
  </div>
</footer>

</body>
</html>
